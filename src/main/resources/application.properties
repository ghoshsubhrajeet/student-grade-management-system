spring.application.name=student-grade-management-system

# Database Connection Properties (Default: H2, Fallback to Env Vars for Postgres)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:mem:grademanager;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
spring.datasource.driverClassName=${SPRING_DATASOURCE_DRIVER:org.h2.Driver}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.jpa.database-platform=${SPRING_JPA_PLATFORM:org.hibernate.dialect.H2Dialect}

# JPA / Hibernate settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# H2 Console Configuration (enabled locally, disabled in production)
spring.h2.console.enabled=${SPRING_H2_CONSOLE_ENABLED:true}
spring.h2.console.path=/h2-console

server.port=${PORT:8081}

spring.security.user.name=admin
spring.security.user.password=admin123
